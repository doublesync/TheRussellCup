{% extends '_base.html' %}

{% block title %}500 Server Error{% endblock %}

{% block content %}
<div class="flex flex-col justify-start items-center min-h-screen py-12">
    <div class="bg-base-200 p-8 rounded-xl shadow-xl w-full max-w-md text-center">
        <h1 class="text-5xl font-extrabold text-error">500</h1>
        <p class="text-lg text-base-content mt-2">Server Error</p>

        <p class="mt-4 text-base-content">
            Looks like something went wrong!
        </p>

        {% if reason %}
        <div class="mt-6 px-4 py-2 rounded-lg bg-error text-error-content shadow-lg">
            {{ reason }}
        </div>
        {% endif %}
        
        <a href="/" class="mt-6 btn btn-primary">Go Back Home</a>
    </div>
</div>
{% endblock %}
