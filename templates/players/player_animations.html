{% extends '_base.html' %}
{% load static %}

{% block title %}Player Animations{% endblock %}

{% block content %}
<div class="p-6 max-w-7xl mx-auto">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">Player Animations</h1>
        <div class="badge badge-primary p-3 text-lg font-semibold">
            <i class="fa fa-coins mr-2"></i> {{ player.xp }}
        </div>
    </div>

    <div class="grid gap-6 sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
        {% for type, data in animation_options.items %}
        <div class="card bg-base-100 shadow-md hover:shadow-lg transition-shadow">
            <div class="card-body">
                <h2 class="card-title text-lg font-semibold">{{ type }}</h2>
                <p class="text-sm text-gray-500">
                    <i class="fa fa-coins"></i> {{ data.xp_price }} XP
                </p>
                <div class="mt-4">
                    <button class="btn btn-sm btn-primary w-full">
                        <i class="fas fa-dice mr-2"></i> Roll Animation
                    </button>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
