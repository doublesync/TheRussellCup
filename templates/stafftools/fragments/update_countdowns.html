<script>
    function updateCountdowns() {
        const countdownElements = document.querySelectorAll(".contract-countdown");

        function refresh() {
            const now = new Date();

            countdownElements.forEach(element => {
                const confirmationTime = new Date(element.getAttribute("data-time"));
                const timeLeft = confirmationTime - now;

                if (timeLeft <= 0) {
                    element.innerText = "Contract finalized!";
                    return;
                }

                const hours = Math.floor(timeLeft / (1000 * 60 * 60));
                const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

                element.innerText = `${hours}h ${minutes}m ${seconds}s`;
            });

            setTimeout(refresh, 1000);
        }

        refresh();
    }
    document.addEventListener("DOMContentLoaded", updateCountdowns);
</script>
