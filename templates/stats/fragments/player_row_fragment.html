<tr id="container-{{ player.id }}">
    <td class="text-center font-semibold">{{ player.team.name }}</td>
    <td class="text-center font-semibold w-[200px] truncate">
        <select class="js-multiple-select w-[200px]" hx-post="{% url 'htmx_change_stat_player' %}" hx-trigger="change" hx-target="closest tr" hx-swap="outerHTML">
            <option value="{{ player.id }}" selected>{{ player.first_name }} {{ player.last_name }}</option>
            {% for new_player in all_players %}
                {% if new_player.id != player.id %}
                    <option value="{{ new_player.id }}">{{ new_player.first_name }} {{ new_player.last_name }}</option>
                {% endif %}
            {% endfor %}
        </select>
    </td>
    <td><input type="number" name="minutes-{{ player.id }}" class="input input-bordered w-full min-w-[50px]" /></td>
    <td><input type="number" name="rebounds-{{ player.id }}" class="input input-bordered w-full min-w-[50px]" /></td>
    <td><input type="number" name="assists-{{ player.id }}" class="input input-bordered w-full min-w-[50px]" /></td>
    <td><input type="number" name="steals-{{ player.id }}" class="input input-bordered w-full min-w-[50px]" /></td>
    <td><input type="number" name="blocks-{{ player.id }}" class="input input-bordered w-full min-w-[50px]" /></td>
    <td><input type="number" name="turnovers-{{ player.id }}" class="input input-bordered w-full min-w-[50px]" /></td>
    <td><input type="number" name="field_goals_made-{{ player.id }}" class="input input-bordered w-full min-w-[50px]" /></td>
    <td><input type="number" name="field_goals_attempted-{{ player.id }}" class="input input-bordered w-full min-w-[50px]" /></td>
    <td><input type="number" name="three_pointers_made-{{ player.id }}" class="input input-bordered w-full min-w-[50px]" /></td>
    <td><input type="number" name="three_pointers_attempted-{{ player.id }}" class="input input-bordered w-full min-w-[50px]" /></td>
    <td><input type="number" name="free_throws_made-{{ player.id }}" class="input input-bordered w-full min-w-[50px]" /></td>
    <td><input type="number" name="free_throws_attempted-{{ player.id }}" class="input input-bordered w-full min-w-[50px]" /></td>
    <td><input type="number" name="offensive_rebounds-{{ player.id }}" class="input input-bordered w-full min-w-[50px]" /></td>
    <td><input type="number" name="personal_fouls-{{ player.id }}" class="input input-bordered w-full min-w-[50px]" /></td>
    <td><input type="number" name="plus_minus-{{ player.id }}" class="input input-bordered w-full min-w-[50px]" /></td>
    <td><input type="number" name="points_responsible_for-{{ player.id }}" class="input input-bordered w-full min-w-[50px]" /></td>
    <td><input type="number" name="dunks-{{ player.id }}" class="input input-bordered w-full min-w-[50px]" /></td>
</tr>

{% block scripts %}
{% include 'stafftools/fragments/select2_scripts.html' %}
{% endblock %}

{% block styles %}
{% include 'stafftools/fragments/select2_styles.html' %}
{% endblock %}
